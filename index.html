<!DOCTYPE html>
<html>
<head>
    <title>Boss Nim 2.4 - Smooth Play</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #1a1a2e; color: #fff; margin: 0; padding: 20px; }
        .row { margin: 10px; padding: 15px; background: #16213e; border-radius: 12px; display: block; border: 2px solid #0f3460; }
        .coin { width: 35px; height: 35px; background: radial-gradient(circle, #f1c40f, #f39c12); border-radius: 50%; display: inline-block; margin: 5px; border: 2px solid #d35400; cursor: pointer; transition: 0.2s; }
        .coin.bot-picking { background: #e74c3c !important; transform: scale(1.3); box-shadow: 0 0 15px #ff0000; border-color: #fff; }
        .coin.disabled { cursor: default; opacity: 0.9; }
        #timer { font-size: 50px; font-weight: bold; color: #e74c3c; margin: 10px; }
        #status { font-size: 22px; color: #4eeaff; margin-bottom: 15px; font-weight: bold; min-height: 30px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>
    <h1>🎮 Boss Nim: 2.4 Smooth Edition</h1>
    <div id="status">กำลังโหลด...</div>
    <div id="timer">15</div>
    <div id="game-board"></div>
    <div class="controls">
        <button onclick="resetGame()">สุ่มกระดาน & เริ่มใหม่</button>
    </div>

    <script>
        let rows = [];
        let timeLeft = 15;
        let timerInterval;
        let canUserClick = false;

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("⚠️ หมดเวลา! เจ้านายแพ้แล้วค่ะ!");
                    resetGame();
                }
            }, 1000);
        }

        function render(pickingRow = -1, pickingCount = 0) {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            rows.forEach((count, i) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.innerHTML = `แถว ${i+1} (${count}): `;
                
                for(let j=0; j<count; j++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin' + (canUserClick ? '' : ' disabled');
                    coin.onclick = () => { if(canUserClick) pickCoin(i); };
                    rowDiv.appendChild(coin);
                }
                
                if (i === pickingRow) {
                    for(let k=0; k<pickingCount; k++) {
                        const pc = document.createElement('div');
                        pc.className = 'coin bot-picking';
                        rowDiv.appendChild(pc);
                    }
                }
                board.appendChild(rowDiv);
            });
        }

        function pickCoin(rowIndex) {
            if (!canUserClick || rows[rowIndex] <= 0) return;
            rows[rowIndex]--;
            render();
            startTimer();
            if (rows.every(r => r === 0)) {
                checkWin("เจ้านาย");
            } else {
                // หลังจากเจ้านายหยิบ ให้รอ 1 วินาทีแล้วบอทเดินต่อเลย
                canUserClick = false;
                clearInterval(timerInterval);
                document.getElementById('status').innerText = "ดิฉันกำลังคิดเลขบิตอยู่...";
                setTimeout(computerMove, 1000);
            }
        }

        async function computerMove() {
            let nimSum = rows.reduce((a, b) => a ^ b, 0);
            let rowIndex = -1;
            let amountToPick = 0;

            if (nimSum > 0) {
                for (let i = 0; i < rows.length; i++) {
                    let target = rows[i] ^ nimSum;
                    if (target < rows[i]) { rowIndex = i; amountToPick = rows[i] - target; break; }
                }
            } else {
                for (let i = 0; i < rows.length; i++) {
                    if (rows[i] > 0) { rowIndex = i; amountToPick = 1; break; }
                }
            }

            rows[rowIndex] -= amountToPick;
            render(rowIndex, amountToPick);
            
            await new Promise(r => setTimeout(r, 1000));
            
            render();
            if (rows.every(r => r === 0)) {
                checkWin("ดิฉัน (Piphek)");
            } else {
                canUserClick = true;
                document.getElementById('status').innerText = "ตาเจ้านายแล้วค่ะ!";
                startTimer();
            }
        }

        function checkWin(lastPlayer) {
            clearInterval(timerInterval);
            setTimeout(() => {
                alert(`🎉 จบเกม! ${lastPlayer} หยิบเหรียญสุดท้าย... ${lastPlayer} แพ้ค่ะ!`);
                resetGame();
            }, 100);
        }

        function resetGame() {
            clearInterval(timerInterval);
            rows = Array.from({length: 5}, () => Math.floor(Math.random() * 5) + 1);
            const first = Math.floor(Math.random() * 2);
            
            if (first === 1) {
                canUserClick = false;
                render();
                document.getElementById('status').innerText = "ดิฉันเริ่มก่อนนะค่ะ ดูเหรียญแดงนะคะ!";
                setTimeout(computerMove, 1500);
            } else {
                canUserClick = true;
                render();
                document.getElementById('status').innerText = "เจ้านายเริ่มก่อนค่ะ!";
                startTimer();
            }
        }

        resetGame();
    </script>
</body>
</html>
