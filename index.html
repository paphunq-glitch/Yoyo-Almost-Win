<!DOCTYPE html>
<html>
<head>
    <title>Boss Nim 2.0 - 15s Blitz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a2e; color: #fff; }
        .row { margin: 15px; padding: 15px; background: #16213e; border-radius: 12px; display: inline-block; min-width: 250px; border: 2px solid #0f3460; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .coin { width: 35px; height: 35px; background: radial-gradient(circle, #f1c40f, #f39c12); border-radius: 50%; display: inline-block; margin: 5px; border: 2px solid #d35400; cursor: pointer; transition: 0.2s; }
        .coin:hover { transform: scale(1.2); box-shadow: 0 0 10px #f1c40f; }
        #timer { font-size: 48px; font-weight: bold; color: #e74c3c; text-shadow: 0 0 10px #e74c3c; margin: 20px; }
        #status { font-size: 20px; margin: 10px; color: #4eeaff; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 10px; }
        button:hover { background: #ff2e63; }
    </style>
</head>
<body>
    <h1>🎮 Boss Nim: 15s Blitz Mode</h1>
    <div id="timer">15</div>
    <div id="game-board"></div>
    <div id="status">เตรียมตัว Audit หมากนะคะเจ้านาย!</div>
    <br>
    <button onclick="computerMove()">ให้บอทเดิน (Piphek)</button>
    <button onclick="resetGame()">สุ่มกระดานใหม่ (7,000+ แบบ)</button>

    <script>
        let rows = [];
        let timeLeft = 15;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("⚠️ หมดเวลา! เจ้านายโดน Audit ย้อนหลัง ปรับแพ้ทันทีค่ะ! ๕๕๕");
                    resetGame();
                }
            }, 1000);
        }

        function render() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            rows.forEach((count, i) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.innerHTML = `แถว ${i+1}: `;
                for(let j=0; j<count; j++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin';
                    coin.onclick = () => { 
                        rows[i] = j; // หยิบออกเหลือ j เหรียญ (คลิกเหรียญไหนเหลือแค่นั้น)
                        render();
                        startTimer(); // รีเซ็ตเวลาเมื่อเดินเสร็จ
                        checkWin("เจ้านาย");
                    };
                    rowDiv.appendChild(coin);
                }
                board.appendChild(rowDiv);
            });
        }

        function computerMove() {
            let nimSum = rows.reduce((a, b) => a ^ b, 0);
            if (nimSum > 0) {
                for (let i = 0; i < rows.length; i++) {
                    let target = rows[i] ^ nimSum;
                    if (target < rows[i]) { rows[i] = target; break; }
                }
            } else {
                for (let i = 0; i < rows.length; i++) {
                    if (rows[i] > 0) { rows[i]--; break; }
                }
            }
            render();
            startTimer();
            checkWin("ดิฉัน (Piphek)");
        }

        function checkWin(lastPlayer) {
            if (rows.every(r => r === 0)) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    alert(`🎉 จบเกม! ${lastPlayer} หยิบเหรียญสุดท้าย... ดังนั้น ${lastPlayer} แพ้ค่ะ!`);
                    resetGame();
                }, 100);
            }
        }

        function resetGame() {
            // สุ่ม 5 แถว แถวละ 1-5 เหรียญ (7,776 รูปแบบ)
            rows = Array.from({length: 5}, () => Math.floor(Math.random() * 5) + 1);
            render();
            startTimer();
            document.getElementById('status').innerText = "กระดานใหม่สุ่มเสร็จแล้ว ตาเจ้านายค่ะ!";
        }

        resetGame();
    </script>
</body>
</html>
