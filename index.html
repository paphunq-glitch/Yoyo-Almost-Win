<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Boss Nim 2.9.6 - Stable Final</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #1a1a2e; color: #fff; margin: 0; padding: 20px; }
        .row { margin: 10px auto; padding: 15px; background: #16213e; border-radius: 12px; border: 2px solid #0f3460; max-width: 600px; min-height: 60px; }
        .coin { width: 35px; height: 35px; background: radial-gradient(circle, #f1c40f, #f39c12); border-radius: 50%; display: inline-block; margin: 5px; border: 2px solid #d35400; cursor: pointer; transition: 0.2s; }
        .coin.selected { background: #ff4500 !important; border-color: #fff; transform: scale(1.1); box-shadow: 0 0 15px #ff4500; }
        .coin.bot-picking { background: #e74c3c !important; transform: scale(1.2); box-shadow: 0 0 15px #ff0000; }
        #timer { font-size: 60px; font-weight: bold; color: #e74c3c; margin: 10px; }
        #status { font-size: 24px; color: #4eeaff; margin-bottom: 20px; font-weight: bold; min-height: 35px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 5px; }
        .btn-confirm { background: #2ecc71; } .btn-confirm:hover:not(:disabled) { background: #27ae60; }
        .btn-pause { background: #f39c12; }
        button:disabled { opacity: 0.1; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🎮 Boss Nim: Master v2.9.6</h1>
    <div id="status">ระบบเสถียรแล้วค่ะ เจ้านาย!</div>
    <div id="timer">15</div>
    <div id="game-board"></div>
    <div class="controls">
        <button id="confirm-btn" class="btn-confirm" onclick="confirmMove()" disabled>ยืนยันหมาก (Confirm)</button>
        <button id="clear-btn" onclick="clearSelection()" disabled>ล้างการเลือก</button>
        <button id="pause-btn" class="btn-pause" onclick="togglePause()">หยุดชั่วคราว (Pause)</button>
        <button id="reset-btn" onclick="manualReset()">สุ่มกระดานใหม่</button>
    </div>

    <script>
        let rows = [];
        let selection = { row: -1, count: 0 };
        let timeLeft = 15, timerInterval, isBotTurn = false, isPaused = false, isGameOver = false;

        // ฟังก์ชันวาดกระดาน
        function render(botRow = -1, botPick = 0) {
            const board = document.getElementById('game-board');
            if (!board) return; // ป้องกัน Error ถ้าหาบอร์ดไม่เจอ
            board.innerHTML = '';
            
            rows.forEach((count, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.innerHTML = `แถว ${rowIndex + 1} (${count}): `;
                for (let i = 0; i < count; i++) {
                    const coin = document.createElement('div');
                    coin.className = 'coin';
                    if (!isBotTurn && !isPaused && !isGameOver) {
                        if (selection.row === -1 || selection.row === rowIndex) {
                            if (selection.row === rowIndex && i >= count - selection.count) coin.className += ' selected';
                            coin.onclick = () => handleSelect(rowIndex);
                        }
                    }
                    rowDiv.appendChild(coin);
                }
                if (rowIndex === botRow) {
                    for (let k = 0; k < botPick; k++) {
                        const bc = document.createElement('div');
                        bc.className = 'coin bot-picking';
                        rowDiv.appendChild(bc);
                    }
                }
                board.appendChild(rowDiv);
            });
        }

        function handleSelect(rowIndex) {
            if (isBotTurn || isPaused || isGameOver) return;
            if (selection.row !== -1 && selection.row !== rowIndex) return;
            selection.row = rowIndex;
            selection.count = (selection.count < rows[rowIndex]) ? selection.count + 1 : 1;
            document.getElementById('confirm-btn').disabled = false;
            document.getElementById('clear-btn').disabled = false;
            render();
        }

        function clearSelection() {
            selection = { row: -1, count: 0 };
            document.getElementById('confirm-btn').disabled = true;
            document.getElementById('clear-btn').disabled = true;
            render();
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "เล่นต่อ (Resume)" : "หยุดชั่วคราว (Pause)";
            document.getElementById('status').innerText = isPaused ? "⏸️ หยุดชั่วคราว..." : (isBotTurn ? "ดิฉันกำลังเดิน..." : "ตาเจ้านายค่ะ!");
            render();
        }

        function confirmMove() {
            if (isBotTurn || isPaused || isGameOver || selection.row === -1) return;
            rows[selection.row] -= selection.count;
            clearSelection();
            if (rows.every(r => r === 0)) return checkWin("เจ้านาย");
            isBotTurn = true;
            clearInterval(timerInterval);
            document.getElementById('status').innerText = "ดิฉันกำลัง Audit งบ...";
            render();
            setTimeout(computerMove, 1000);
        }

        async function computerMove() {
            if (isGameOver) return;
            let nimSum = rows.reduce((a, b) => a ^ b, 0);
            let rIdx = -1, pAmt = 0;
            let heapsOverOne = rows.filter(r => r > 1).length;
            
            if (heapsOverOne <= 1) {
                let totalHeaps = rows.filter(r => r > 0).length;
                let heapIdx = rows.findIndex(r => r > 1);
                if (heapIdx === -1) {
                    rIdx = rows.findIndex(r => r > 0);
                    pAmt = 1;
                } else {
                    let otherHeaps = totalHeaps - 1;
                    pAmt = (otherHeaps % 2 === 0) ? rows[heapIdx] - 1 : rows[heapIdx];
                    rIdx = heapIdx;
                }
            } else if (nimSum > 0) {
                for (let i = 0; i < rows.length; i++) {
                    let target = rows[i] ^ nimSum;
                    if (target < rows[i]) { rIdx = i; pAmt = rows[i] - target; break; }
                }
            } else {
                rIdx = rows.findIndex(r => r > 0);
                pAmt = 1;
            }

            if (rIdx !== -1) {
                rows[rIdx] -= pAmt;
                render(rIdx, pAmt);
                await new Promise(r => setTimeout(r, 1200));
            }
            
            isBotTurn = false;
            render();
            if (rows.every(r => r === 0)) return checkWin("ดิฉัน (Piphek)");
            timeLeft = 15;
            document.getElementById('status').innerText = "ตาเจ้านายแล้วค่ะ!";
            if (!isPaused) startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = timeLeft;
            timerInterval = setInterval(() => {
                if (!isPaused && !isBotTurn && !isGameOver) {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft <= 0) { 
                        clearInterval(timerInterval); 
                        isGameOver = true;
                        alert("⚠️ หมดเวลา! ดิฉันชนะค่ะ!"); 
                        manualReset(); 
                    }
                }
            }, 1000);
        }

        function checkWin(p) {
            clearInterval(timerInterval);
            isGameOver = true;
            document.getElementById('status').innerText = "จบเกมแล้วค่ะ";
            setTimeout(() => { 
                alert(`🏁 จบเกม! ${p === "เจ้านาย" ? "เจ้านาย" : "ดิฉัน"} เป็นคนหยิบเหรียญสุดท้าย... ${p} แพ้ค่ะ!`); 
                manualReset(); 
            }, 200);
        }

        function manualReset() {
            clearInterval(timerInterval);
            rows = Array.from({length: 5}, () => Math.floor(Math.random() * 5) + 1);
            selection = { row: -1, count: 0 };
            isBotTurn = false; isPaused = false; isGameOver = false; timeLeft = 15;
            document.getElementById('pause-btn').innerText = "หยุดชั่วคราว (Pause)";
            document.getElementById('confirm-btn').disabled = true;
            document.getElementById('clear-btn').disabled = true;
            
            render();
            const first = Math.floor(Math.random() * 2);
            if (first === 1) { 
                isBotTurn = true; 
                document.getElementById('status').innerText = "ดิฉันเริ่มก่อนนะค่ะ!"; 
                setTimeout(computerMove, 1000); 
            } else { 
                document.getElementById('status').innerText = "เจ้านายเริ่มก่อน!"; 
                startTimer(); 
            }
        }

        // --- จุดสำคัญ: ตรวจสอบว่า HTML โหลดเสร็จก่อนค่อยเริ่มเกม ---
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', manualReset);
        } else {
            manualReset();
        }
    </script>
</body>
</html>
